{% extends 'base.html' %}
{% load static %}

{% block head %}
<title>Our Instructors | MindTopia</title>

<style>
    /* Hero Section Styling */
    .hero-section {
        position: relative;
        background: url("{% static 'img/instructors-banner.jpg' %}") center/cover no-repeat;
        height: 250px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .hero-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
    }
    .hero-content {
        position: relative;
        color: white;
    }
    /* Instructor Card Styling */
    .instructor-card {
        border-radius: 10px;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
    }
    .instructor-card:hover {
        transform: scale(1.05);
        box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
    }
    .card-img-top {
        height: 250px;
        object-fit: cover;
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
    }
</style>
{% endblock %}

{% block content %}

<!-- Hero Section -->
<section class="hero-section">
    <div class="hero-content">
        <h1 class="fw-bold">Meet Our <span class="text-warning">Instructors</span></h1>
    </div>
</section>

<!-- Instructors Section -->
<div class="container py-5">
    <h2 class="text-center fw-bold mb-4">Our Instructors</h2>

    <div class="row g-4 justify-content-center">
        {% for ins in ins %}
        <div class="col-lg-4 col-md-6">
            <div class="card instructor-card border-0">
                <img src="../media/{{ ins.image }}" class="card-img-top img-fluid" alt="{{ ins.name }}">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">{{ ins.name }}</h5>
                    <a href="{{ ins.url }}" class="btn btn-primary mt-2" target="_blank">Know More</a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center">
            <p class="text-muted lead">No instructors available at the moment.</p>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
