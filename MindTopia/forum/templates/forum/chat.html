{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Live Chat - Room: {{ room_name }}</h2>
    <div id="chat-box" style="border:1px solid #ddd; padding:10px; height:300px; overflow-y:scroll;"></div>

    <input type="text" id="chat-message-input" class="form-control mt-2" placeholder="Type a message...">
    <button id="chat-message-submit" class="btn btn-primary mt-2">Send</button>
</div>

<script>
    const roomName = "{{ room_name }}";
    const chatSocket = new WebSocket("ws://" + window.location.host + "/ws/forum/" + roomName + "/");

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        document.querySelector("#chat-box").innerHTML += "<p><strong>" + data.username + ":</strong> " + data.message + "</p>";
    };

    document.querySelector("#chat-message-submit").onclick = function(e) {
        const messageInput = document.querySelector("#chat-message-input");
        const message = messageInput.value;
        
        chatSocket.send(JSON.stringify({
            "message": message,
            "username": "{{ request.user.username }}"
        }));

        messageInput.value = "";
    };
</script>
{% endblock %}
