{% extends "base.html" %}
{% load crispy_forms_tags %}
{% load static %}

{% block head %}
<!-- Page title shown in the browser tab -->
<title>Discuss here!</title>

<!-- Page-specific stylesheet -->
<link rel="stylesheet" href="{% static 'css/forum.css' %}">
{% endblock %}


{% block content %}

<!-- Discussion form container -->
<div class="container post-container py-5">
    <div class="content-section">

        <!-- Discussion submission form -->
        <form method="post">
            {% csrf_token %}

            <!-- Form field group -->
            <fieldset class="form-group">
                <legend class="border-bottom mb-4">
                    Discuss Here!
                </legend>

                <!-- Render Django form using Crispy Forms -->
                {{ form|crispy }}
            </fieldset>

            <!-- Submit button -->
            <div class="form-group forum-btn">
                <button
                    type="submit"
                    class="btn btn-outline-info forum-btn">
                    Post
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
