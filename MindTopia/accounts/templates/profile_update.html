{% extends "base.html" %}
{% load crispy_forms_tags %}
{% load static %}

{% block head %}
<title>Update Your Info!</title>
<link rel="stylesheet" type="text/css" href="{% static 'css/forum.css' %}">
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 p-4">
                <div class="text-center">
                    <img class="rounded-circle img-fluid mb-3" src="{{ user.profile.image.url }}" alt="Profile Image" width="150" height="150">
                </div>
                <h3 class="text-center fw-bold mb-4">Profile Info</h3>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ u_form|crispy }}
                    {{ p_form|crispy }}
                    <div class="d-grid">
                        <button class="btn btn-primary mt-3" type="submit">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
