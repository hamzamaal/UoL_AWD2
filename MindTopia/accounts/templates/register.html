{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block head %}
<title>Register Here!</title>
<link rel="stylesheet" type="text/css" href="{% static 'css/forum.css' %}">
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h3 class="text-center fw-bold mb-4">Join Today</h3>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid">
                            <button class="btn btn-primary mt-3" type="submit">Sign Up</button>
                        </div>
                    </form>
                    <div class="border-top pt-3 mt-3 text-center">
                        <small class="text-muted">
                            Already Have An Account? 
                            <a href="{% url 'login' %}" class="ms-2 text-decoration-none">Sign In</a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
