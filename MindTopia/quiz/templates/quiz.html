{% extends 'base.html' %}
{% load static %}

{% block head %}
    <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <title>Miscellaneous Quiz</title>
    <link rel="stylesheet" href="{% static 'css/forum.css' %}">
    <script src="{% static 'js/quiz.js' %}"></script>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 p-4">
                <div class="text-center">
                    <a href="/questions" class="btn btn-secondary mb-3">Reset</a>
                    <h1 class="fw-bold">Objective Test Questions</h1>
                    <p class="text-muted">Test your knowledge</p>
                </div>

                <div id="results"></div>

                <form name="quizForm" onsubmit="return submitAnswers(answers=[{% for q in questions %}'{{ q.answer }}',{% endfor %}])">
                    {% for q in questions %}
                    <div class="mb-4">
                        <h5 class="fw-bold">{{ q.id }}. {{ q.question }}</h5>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q{{ q.id }}" value="a" id="q{{ q.id }}a">
                            <label class="form-check-label" for="q{{ q.id }}a">a. {{ q.option1 }}</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q{{ q.id }}" value="b" id="q{{ q.id }}b">
                            <label class="form-check-label" for="q{{ q.id }}b">b. {{ q.option2 }}</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q{{ q.id }}" value="c" id="q{{ q.id }}c">
                            <label class="form-check-label" for="q{{ q.id }}c">c. {{ q.option3 }}</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q{{ q.id }}" value="d" id="q{{ q.id }}d">
                            <label class="form-check-label" for="q{{ q.id }}d">d. {{ q.option4 }}</label>
                        </div>
                    </div>
                    {% endfor %}

                    <div class="text-center">
                        <button class="btn btn-primary mt-3" type="submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
